    class in the module to be instantiated on library initialisation.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.PostprocessorRegistration.html</link></decl><decl id="65" type="struct"><name>Priority</name><desc>&lt;div&gt;&lt;p&gt;Embodies the notion of a priority at which a postprocessor should be instantiated,
    and as such, the order in which they will be called to process events.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.Priority.html</link><decl id="66" type="variable"><name>value</name><desc>&lt;div&gt;&lt;p&gt;Numerical priority value. Lower is higher.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.Priority.value.html</link></decl><decl id="67" type="function"><name>opUnary</name><desc>&lt;div&gt;&lt;p&gt;Helper &lt;tt class=&quot;inline-code&quot;&gt;opUnary&lt;/tt&gt; to allow for &lt;tt class=&quot;inline-code&quot;&gt;-10.priority&lt;/tt&gt;, instead of having to do the
        (more correct) &lt;tt class=&quot;inline-code&quot;&gt;(-10).priority&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.Priority.opUnary.html</link></decl></decl><decl id="68" type="alias"><name>priority</name><desc>&lt;div&gt;&lt;p&gt;Helper alias to use the proper style guide and still be able to instantiate
    &lt;a class=&quot;xref&quot; href=&quot;dialect.postprocessors.Priority.html&quot;&gt;Priority&lt;/a&gt; instances with UFCS.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.priority.html</link></decl><decl id="69" type="module"><name>dialect.postprocessors.twitch</name><desc>&lt;div&gt;&lt;p&gt;The Twitch postprocessor processes &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s after
    they are parsed, and deals with Twitch-specifics. Those include extracting
    the colour someone's name should be printed in, their alias/&amp;quot;display name&amp;quot;
    (generally their nickname cased), converting the event to some event types
    unique to Twitch, etc.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.html</link><decl id="70" type="function"><name>parseTwitchTags</name><desc>&lt;div&gt;&lt;p&gt;Parses a Twitch event's IRCv3 tags.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.parseTwitchTags.html</link></decl><decl id="71" type="class"><name>TwitchPostprocessor</name><desc>&lt;div&gt;&lt;p&gt;Twitch-specific postprocessor.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.TwitchPostprocessor.html</link><decl id="72" type="function"><name>postprocess</name><desc>&lt;div&gt;&lt;p&gt;Handle Twitch specifics, modifying the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;
        to add things like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html#colour&quot;&gt;IRCEvent.colour&lt;/a&gt; and
        differentiate between temporary and permanent bans.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.postprocessors.twitch.TwitchPostprocessor.postprocess.html</link></decl></decl></decl></decl><decl id="73" type="module"><name>dialect.parsing</name><desc>&lt;div&gt;&lt;p&gt;Functions related to parsing IRC events.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.html</link><decl id="74" type="function"><name>toIRCEvent</name><desc>&lt;div&gt;&lt;p&gt;Parses an IRC string into an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.toIRCEvent.html</link></decl><decl id="75" type="function"><name>parseBasic</name><desc>&lt;div&gt;&lt;p&gt;Parses the most basic of IRC events; &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#PING&quot;&gt;PING&lt;/a&gt;,
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#ERROR&quot;&gt;ERROR&lt;/a&gt;,
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#PONG&quot;&gt;PONG&lt;/a&gt;,
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#NOTICE&quot;&gt;NOTICE&lt;/a&gt; (plus &lt;tt class=&quot;inline-code&quot;&gt;NOTICE AUTH&lt;/tt&gt;),
    and &lt;tt class=&quot;inline-code&quot;&gt;AUTHENTICATE&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.parseBasic.html</link></decl><decl id="76" type="function"><name>parsePrefix</name><desc>&lt;div&gt;&lt;p&gt;Takes a slice of a raw IRC string and starts parsing it into an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt; struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.parsePrefix.html</link></decl><decl id="77" type="function"><name>parseTypestring</name><desc>&lt;div&gt;&lt;p&gt;Takes a slice of a raw IRC string and continues parsing it into an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt; struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.parseTypestring.html</link></decl><decl id="78" type="function"><name>parseSpecialcases</name><desc>&lt;div&gt;&lt;p&gt;Takes a slice of a raw IRC string and continues parsing it into an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt; struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.parseSpecialcases.html</link></decl><decl id="79" type="function"><name>parseGeneralCases</name><desc>&lt;div&gt;&lt;p&gt;Takes a slice of a raw IRC string and continues parsing it into an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt; struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.parseGeneralCases.html</link></decl><decl id="80" type="function"><name>postparseSanityCheck</name><desc>&lt;div&gt;&lt;p&gt;Checks for some specific erroneous edge cases in an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.postparseSanityCheck.html</link></decl><decl id="81" type="function"><name>onNotice</name><desc>&lt;div&gt;&lt;p&gt;Handle &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#NOTICE&quot;&gt;NOTICE&lt;/a&gt; events.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.onNotice.html</link></decl><decl id="82" type="function"><name>onPRIVMSG</name><desc>&lt;div&gt;&lt;p&gt;Handle &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#QUERY&quot;&gt;QUERY&lt;/a&gt; and
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#CHAN&quot;&gt;CHAN&lt;/a&gt; messages
    (&lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#PRIVMSG&quot;&gt;PRIVMSG&lt;/a&gt;).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.onPRIVMSG.html</link></decl><decl id="83" type="function"><name>onMode</name><desc>&lt;div&gt;&lt;p&gt;Handle &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#MODE&quot;&gt;MODE&lt;/a&gt; changes.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.onMode.html</link></decl><decl id="84" type="function"><name>onISUPPORT</name><desc>&lt;div&gt;&lt;p&gt;Handles &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#RPL_ISUPPORT&quot;&gt;RPL_ISUPPORT&lt;/a&gt; events.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.onISUPPORT.html</link></decl><decl id="85" type="function"><name>onMyInfo</name><desc>&lt;div&gt;&lt;p&gt;Handle &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html#RPL_MYINFO&quot;&gt;RPL_MYINFO&lt;/a&gt; events.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.onMyInfo.html</link></decl><decl id="86" type="function"><name>applyTags</name><desc>&lt;div&gt;&lt;p&gt;This is technically a postprocessor but it's small enough that we can just
    keep it in here (and provide the functionality as &lt;tt class=&quot;inline-code&quot;&gt;pure&lt;/tt&gt; and &lt;tt class=&quot;inline-code&quot;&gt;@safe&lt;/tt&gt;).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.applyTags.html</link></decl><decl id="87" type="struct"><name>IRCParser</name><desc>&lt;div&gt;&lt;p&gt;Parser that takes raw IRC strings and produces &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s based on them.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.html</link><decl id="88" type="variable"><name>client</name><desc>&lt;div&gt;&lt;p&gt;The current &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;IRCClient&lt;/a&gt; with all the context
        needed for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.client.html</link></decl><decl id="89" type="variable"><name>server</name><desc>&lt;div&gt;&lt;p&gt;The current &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; with all the context
        needed for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.server.html</link></decl><decl id="90" type="variable"><name>typenums</name><desc>&lt;div&gt;&lt;p&gt;An &lt;tt class=&quot;inline-code&quot;&gt;dialect.defs.IRCEvent.Type[1024]&lt;/tt&gt; reverse lookup table for fast
        numeric lookups.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.typenums.html</link></decl><decl id="91" type="function"><name>toIRCEvent</name><desc>&lt;div&gt;&lt;p&gt;Parses an IRC string into an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.toIRCEvent.html</link></decl><decl id="92" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.parsing.IRCParser.html&quot;&gt;IRCParser&lt;/a&gt; with the passed &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;IRCClient&lt;/a&gt;
        and &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; as base context for parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.this.html</link></decl><decl id="93" type="postblit"><name>this(this)</name><desc>&lt;div&gt;&lt;p&gt;Disallow copying of this struct.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.this(this).html</link></decl><decl id="94" type="variable"><name>postprocessors</name><desc>&lt;div&gt;&lt;p&gt;Array of active &lt;a class=&quot;xref&quot; href=&quot;dialect.common.Postprocessor.html&quot;&gt;Postprocessor&lt;/a&gt;s, to be
            iterated through and processed after parsing is complete.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.postprocessors.html</link></decl><decl id="95" type="function"><name>initPostprocessors</name><desc>&lt;div&gt;&lt;p&gt;Initialises defined postprocessors.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.initPostprocessors.html</link></decl><decl id="96" type="enum"><name>Update</name><desc>&lt;div&gt;&lt;p&gt;Bitfield enum of what member of an instance of &lt;tt class=&quot;inline-code&quot;&gt;IRCParser&lt;/tt&gt; was
            updated (if any).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.Update.html</link></decl><decl id="97" type="variable"><name>updates</name><desc>&lt;div&gt;&lt;p&gt;Bitfield of in what way the parser's internal state was altered
            during parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.updates.html</link></decl><decl id="98" type="function"><name>clientUpdated</name><desc>&lt;div&gt;&lt;p&gt;Wrapper for backwards compatibility with pre-bitfield update-signaling.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.clientUpdated.1.html</link></decl><decl id="99" type="function"><name>serverUpdated</name><desc>&lt;div&gt;&lt;p&gt;Wrapper for backwards compatibility with pre-bitfield update-signaling.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.serverUpdated.1.html</link></decl><decl id="100" type="function"><name>clientUpdated</name><desc>&lt;div&gt;&lt;p&gt;Wrapper for backwards compatibility with pre-bitfield update-signaling.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.clientUpdated.2.html</link></decl><decl id="101" type="function"><name>serverUpdated</name><desc>&lt;div&gt;&lt;p&gt;Wrapper for backwards compatibility with pre-bitfield update-signaling.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.parsing.IRCParser.serverUpdated.2.html</link></decl></decl></decl><decl id="102" type="module"><name>dialect.semver</name><desc>&lt;div&gt;&lt;p&gt;SemVer information about the current release.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.html</link><decl id="103" type="enum"><name>DialectSemVer</name><desc>&lt;div&gt;&lt;p&gt;SemVer versioning of this build.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.DialectSemVer.html</link></decl><decl id="104" type="manifest constant"><name>DialectSemVerPrerelease</name><desc>&lt;div&gt;&lt;p&gt;Pre-release SemVer subversion of this build.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.DialectSemVerPrerelease.html</link></decl></decl><decl id="105" type="module"><name>dialect.defs</name><desc>&lt;div&gt;&lt;p&gt;Definitions of struct aggregates used throughout the library, representing
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s and thereto related objects like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; and &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.html</link><decl id="106" type="struct"><name>IRCEvent</name><desc>&lt;div&gt;&lt;p&gt;A single IRC event, parsed from server input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.html</link><decl id="107" type="manifest constant"><name>numAuxStrings</name><desc>&lt;div&gt;&lt;p&gt;How many elements should be allocated for auxiliary strings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.numAuxStrings.html</link></decl><decl id="108" type="manifest constant"><name>numCounts</name><desc>&lt;div&gt;&lt;p&gt;How many elements should be allocated for counts.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.numCounts.html</link></decl><decl id="109" type="enum"><name>Type</name><desc>&lt;div&gt;&lt;p&gt;&lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html&quot;&gt;Type&lt;/a&gt;s of &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.Type.html</link></decl><decl id="110" type="variable"><name>type</name><desc>&lt;div&gt;&lt;p&gt;The event type, signifying what *kind* of event this is.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.type.html</link></decl><decl id="111" type="variable"><name>num</name><desc>&lt;div&gt;&lt;p&gt;With a numeric event, the number of the event type.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.num.html</link></decl><decl id="112" type="variable"><name>raw</name><desc>&lt;div&gt;&lt;p&gt;The raw IRC string, untouched.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.raw.html</link></decl><decl id="113" type="variable"><name>sender</name><desc>&lt;div&gt;&lt;p&gt;The name of whoever (or whatever) sent this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.sender.html</link></decl><decl id="114" type="variable"><name>channel</name><desc>&lt;div&gt;&lt;p&gt;The channel the event transpired in, or is otherwise related to.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.channel.html</link></decl><decl id="115" type="variable"><name>target</name><desc>&lt;div&gt;&lt;p&gt;The target user of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.target.html</link></decl><decl id="116" type="variable"><name>content</name><desc>&lt;div&gt;&lt;p&gt;The main body of text of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.content.html</link></decl><decl id="117" type="variable"><name>aux</name><desc>&lt;div&gt;&lt;p&gt;Auxiliary string array.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.aux.html</link></decl><decl id="118" type="variable"><name>tags</name><desc>&lt;div&gt;&lt;p&gt;IRCv3 message tags attached to this event&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.tags.html</link></decl><decl id="119" type="variable"><name>count</name><desc>&lt;div&gt;&lt;p&gt;Count array.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.count.html</link></decl><decl id="120" type="variable"><name>time</name><desc>&lt;div&gt;&lt;p&gt;A timestamp of when the event transpired.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.time.html</link></decl><decl id="121" type="variable"><name>errors</name><desc>&lt;div&gt;&lt;p&gt;What errors occurred during parsing, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.errors.html</link></decl><decl id="122" type="variable"><name>emotes</name><desc>&lt;div&gt;&lt;p&gt;The Twitch emotes in the message, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.emotes.html</link></decl><decl id="123" type="variable"><name>id</name><desc>&lt;div&gt;&lt;p&gt;The Twitch ID of this message.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.id.html</link></decl></decl><decl id="124" type="struct"><name>IRCServer</name><desc>&lt;div&gt;&lt;p&gt;Aggregate of all information and state pertaining to the connected IRC
    server. Some fields are transient on a per-connection basis and should not
    be serialised.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.html</link><decl id="125" type="enum"><name>Daemon</name><desc>&lt;div&gt;&lt;p&gt;Server daemons, or families of server programs.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.Daemon.html</link></decl><decl id="126" type="enum"><name>CaseMapping</name><desc>&lt;div&gt;&lt;p&gt;Case mappings used by an IRC server.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.CaseMapping.html</link></decl><decl id="127" type="variable"><name>address</name><desc>&lt;div&gt;&lt;p&gt;Server address (or IP).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.address.html</link></decl><decl id="128" type="variable"><name>port</name><desc>&lt;div&gt;&lt;p&gt;The port to connect to, usually &lt;tt class=&quot;inline-code&quot;&gt;6667&lt;/tt&gt;-&lt;tt class=&quot;inline-code&quot;&gt;6669&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.port.html</link></decl><decl id="129" type="variable"><name>daemon</name><desc>&lt;div&gt;&lt;p&gt;The server daemon family the server is running.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemon.html</link></decl><decl id="130" type="variable"><name>network</name><desc>&lt;div&gt;&lt;p&gt;Server network string, like Freenode, QuakeNet, Rizon.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.network.html</link></decl><decl id="131" type="variable"><name>daemonstring</name><desc>&lt;div&gt;&lt;p&gt;The reported daemon, with version.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.daemonstring.html</link></decl><decl id="132" type="variable"><name>resolvedAddress</name><desc>&lt;div&gt;&lt;p&gt;The IRC server address handed to us by the round robin pool.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.resolvedAddress.html</link></decl><decl id="133" type="variable"><name>maxNickLength</name><desc>&lt;div&gt;&lt;p&gt;Max nickname length as per IRC specs, but not the de facto standard.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxNickLength.html</link></decl><decl id="134" type="variable"><name>maxChannelLength</name><desc>&lt;div&gt;&lt;p&gt;Max channel name length as per IRC specs, or as reported.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCServer.maxChannelLength.html</link></decl><decl id="135" type="variable"><name>aModes</name><desc>&lt;div&gt;&lt;p&gt;A = Mode that adds or removes a nick or address to a list.

        (SorceryNet).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.Typenums.sorircd.html</link></decl></decl><decl id="192" type="struct"><name>IRCChannel</name><desc>&lt;div&gt;&lt;p&gt;Aggregate personifying an IRC channel and its state.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.html</link><decl id="193" type="struct"><name>Mode</name><desc>&lt;div&gt;&lt;p&gt;A channel mode.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.html</link><decl id="194" type="variable"><name>modechar</name><desc>&lt;div&gt;&lt;p&gt;The character that implies this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt; (&lt;tt class=&quot;inline-code&quot;&gt;i&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;z&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;l&lt;/tt&gt; ...).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.modechar.html</link></decl><decl id="195" type="variable"><name>data</name><desc>&lt;div&gt;&lt;p&gt;The data associated with the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;, if applicable. This is often a
            number, such as what &lt;tt class=&quot;inline-code&quot;&gt;l&lt;/tt&gt; takes (join limit).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.data.html</link></decl><decl id="196" type="variable"><name>user</name><desc>&lt;div&gt;&lt;p&gt;The user associated with the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;, when it is not just &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.data.html&quot;&gt;data&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.user.html</link></decl><decl id="197" type="variable"><name>channel</name><desc>&lt;div&gt;&lt;p&gt;The channel this mode refers to, where applicable.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.channel.html</link></decl><decl id="198" type="variable"><name>exceptions</name><desc>&lt;div&gt;&lt;p&gt;Users that are explicitly exempt from the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.exceptions.html</link></decl><decl id="199" type="variable"><name>negated</name><desc>&lt;div&gt;&lt;p&gt;Whether or not this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt; should be considered to be its own antithesis.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.negated.html</link></decl><decl id="200" type="function"><name>opEquals</name><desc>&lt;div&gt;&lt;p&gt;Compare two &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;s with each other to see if they are both of the
            same type, as well as having the same &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.data.html&quot;&gt;data&lt;/a&gt; and/or &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.user.html&quot;&gt;user&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.opEquals.html</link></decl><decl id="201" type="function"><name>toHash</name><desc>&lt;div&gt;&lt;p&gt;Produces a hash for this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.toHash.html</link></decl></decl><decl id="202" type="variable"><name>name</name><desc>&lt;div&gt;&lt;p&gt;The channel name.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.name.html</link></decl><decl id="203" type="variable"><name>topic</name><desc>&lt;div&gt;&lt;p&gt;The current topic of the channel, as set by operators.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.topic.html</link></decl><decl id="204" type="variable"><name>modechars</name><desc>&lt;div&gt;&lt;p&gt;The current non-&lt;a class=&quot;xref&quot; href=&quot;data.html&quot;&gt;data&lt;/a&gt;-sporting &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;s of the channel.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.modechars.html</link></decl><decl id="205" type="variable"><name>modes</name><desc>&lt;div&gt;&lt;p&gt;Array of all &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;s that are not simply represented in &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.modechars.html&quot;&gt;modechars&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.modes.html</link></decl><decl id="206" type="variable"><name>users</name><desc>&lt;div&gt;&lt;p&gt;Associative array of all the nicknames inhabiting the channel.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.users.html</link></decl><decl id="207" type="variable"><name>mods</name><desc>&lt;div&gt;&lt;p&gt;Associative array of nicknames with a prefixing channel mode (operator,
        halfops, voiced, ...) keyed by modechar.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.mods.html</link></decl><decl id="208" type="function"><name>modsShorthand</name><desc>&lt;div&gt;&lt;p&gt;Template to deduplicate code for mods shorthands.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.modsShorthand.html</link></decl><decl id="209" type="alias"><name>ops</name><desc>&lt;div&gt;&lt;p&gt;Array of channel operators.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.ops.html</link></decl><decl id="210" type="alias"><name>halfops</name><desc>&lt;div&gt;&lt;p&gt;Array of channel halfops.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.halfops.html</link></decl><decl id="211" type="alias"><name>voiced</name><desc>&lt;div&gt;&lt;p&gt;Array of voiced channel users.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.voiced.html</link></decl><decl id="212" type="variable"><name>created</name><desc>&lt;div&gt;&lt;p&gt;When the channel was created, expressed in UNIX time.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.created.html</link></decl></decl><decl id="213" type="struct"><name>IRCClient</name><desc>&lt;div&gt;&lt;p&gt;Aggregate collecting all the relevant settings, options and state needed for
    a connection to an IRC server.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.html</link><decl id="214" type="variable"><name>nickname</name><desc>&lt;div&gt;&lt;p&gt;Client nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.nickname.html</link></decl><decl id="215" type="variable"><name>user</name><desc>&lt;div&gt;&lt;p&gt;Client &amp;quot;user&amp;quot;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.user.html</link></decl><decl id="216" type="variable"><name>realName</name><desc>&lt;div&gt;&lt;p&gt;Client GECOS/&amp;quot;real name&amp;quot;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.realName.html</link></decl><decl id="217" type="variable"><name>origNickname</name><desc>&lt;div&gt;&lt;p&gt;The original client nickname before connecting, in case it changed.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.origNickname.html</link></decl><decl id="218" type="variable"><name>ident</name><desc>&lt;div&gt;&lt;p&gt;Client IDENT identifier. Defaults to &amp;quot;~&lt;tt class=&quot;inline-code&quot;&gt;user&lt;/tt&gt;&amp;quot;.
            Unused but keep for future expansion.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.ident.html</link></decl><decl id="219" type="variable"><name>displayName</name><desc>&lt;div&gt;&lt;p&gt;Our Twitch display name or alias.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.displayName.html</link></decl><decl id="220" type="variable"><name>modes</name><desc>&lt;div&gt;&lt;p&gt;The current modechars active on the client (e.g. &amp;quot;ix&amp;quot;);&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCClient.modes.html</link></decl></decl></decl><decl id="221" type="module"><name>dialect.assertgen</name><desc>&lt;div&gt;&lt;p&gt;Interactive assert statement generation from raw IRC strings, for use in the
    source code &lt;tt class=&quot;inline-code&quot;&gt;unittest&lt;/tt&gt; blocks.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.html</link><decl id="222" type="function"><name>formatClientAssignment</name><desc>&lt;div&gt;&lt;p&gt;Constructs statement lines for each changed field of an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCClient.html&quot;&gt;IRCClient&lt;/a&gt;, including instantiating a fresh one.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.formatClientAssignment.html</link></decl><decl id="223" type="function"><name>formatEventAssertBlock</name><desc>&lt;div&gt;&lt;p&gt;Constructs assert statement blocks for each changed field of an
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.formatEventAssertBlock.html</link></decl><decl id="224" type="function"><name>inputServerInformation</name><desc>&lt;div&gt;&lt;p&gt;Asks the user to input server information via standard input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.inputServerInformation.html</link></decl></decl><decl id="225" type="module"><name>dialect.common</name><desc>&lt;div&gt;&lt;p&gt;Helper functions needed to parse raw IRC event strings into
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.html</link><decl id="226" type="function"><name>typenumsOf</name><desc>&lt;div&gt;&lt;p&gt;Returns the &lt;tt class=&quot;inline-code&quot;&gt;typenums&lt;/tt&gt; mapping for a given
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.Daemon.html&quot;&gt;IRCServer.Daemon&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.typenumsOf.html</link></decl><decl id="227" type="function"><name>decodeIRCv3String</name><desc>&lt;div&gt;&lt;p&gt;Decodes an IRCv3 tag string, replacing some characters.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.decodeIRCv3String.html</link></decl><decl id="228" type="function"><name>isAuthService</name><desc>&lt;div&gt;&lt;p&gt;Inspects an &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt; and judges whether or not it is
    authentication services.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isAuthService.html</link></decl><decl id="229" type="function"><name>isValidChannel</name><desc>&lt;div&gt;&lt;p&gt;Examines a string and judges whether or not it *looks* like a channel.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidChannel.html</link></decl><decl id="230" type="function"><name>isValidNickname</name><desc>&lt;div&gt;&lt;p&gt;Examines a string and judges whether or not it *looks* like a nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidNickname.html</link></decl><decl id="231" type="function"><name>isValidNicknameCharacter</name><desc>&lt;div&gt;&lt;p&gt;Returns whether or not a passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; can be part of a nickname.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidNicknameCharacter.html</link></decl><decl id="232" type="function"><name>stripModesign</name><desc>&lt;div&gt;&lt;p&gt;Takes a nickname and strips it of any prepended mode signs, like the &lt;tt class=&quot;inline-code&quot;&gt;@&lt;/tt&gt; in
    &lt;tt class=&quot;inline-code&quot;&gt;@nickname&lt;/tt&gt;. Saves the stripped signs in the ref string &lt;tt class=&quot;inline-code&quot;&gt;modesigns&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.stripModesign.1.html</link></decl><decl id="233" type="function"><name>stripModesign</name><desc>&lt;div&gt;&lt;p&gt;Convenience function to &lt;a class=&quot;xref&quot; href=&quot;dialect.common.stripModesign.2.html&quot;&gt;stripModesign&lt;/a&gt; that doesn't take an out string
    parameter to store the stripped modesign characters in.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.stripModesign.2.html</link></decl><decl id="234" type="function"><name>setMode</name><desc>&lt;div&gt;&lt;p&gt;Sets a new or removes a &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;IRCChannel.Mode&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.setMode.html</link></decl><decl id="235" type="class"><name>IRCParseException</name><desc>&lt;div&gt;&lt;p&gt;IRC Parsing Exception, thrown when there were errors parsing.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.html</link><decl id="236" type="variable"><name>event</name><desc>&lt;div&gt;&lt;p&gt;Bundled &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;, parsing which threw this exception.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.event.html</link></decl><decl id="237" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.common.IRCParseException.html&quot;&gt;IRCParseException&lt;/a&gt;, without attaching an
        &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.this.1.html</link></decl><decl id="238" type="constructor"><name>this</name><desc>&lt;div&gt;&lt;p&gt;Create a new &lt;a class=&quot;xref&quot; href=&quot;dialect.common.IRCParseException.html&quot;&gt;IRCParseException&lt;/a&gt;, attaching an
        &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt; to it.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCParseException.this.2.html</link></decl></decl><decl id="239" type="enum"><name>IRCControlCharacter</name><desc>&lt;div&gt;&lt;p&gt;Certain characters that signal specific meaning in an IRC context.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.IRCControlCharacter.html</link></decl><decl id="240" type="function"><name>matchesByMask</name><desc>&lt;div&gt;&lt;p&gt;Compares this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt; with a second one, treating
    fields with asterisks as glob wildcards, mimicking &lt;tt class=&quot;inline-code&quot;&gt;*!*@*&lt;/tt&gt; mask matching.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.matchesByMask.html</link></decl><decl id="241" type="function"><name>isUpper</name><desc>&lt;div&gt;&lt;p&gt;Checks whether the passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; is in uppercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isUpper.html</link></decl><decl id="242" type="function"><name>toLower</name><desc>&lt;div&gt;&lt;p&gt;Produces the passed &lt;tt class=&quot;inline-code&quot;&gt;char&lt;/tt&gt; in lowercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.toLower.html</link></decl><decl id="243" type="function"><name>toLowerCase</name><desc>&lt;div&gt;&lt;p&gt;Produces the passed string in lowercase as per the supplied case mappings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.toLowerCase.html</link></decl><decl id="244" type="function"><name>opEqualsCaseInsensitive</name><desc>&lt;div&gt;&lt;p&gt;Compares two strings to see if they match if case is ignored.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.opEqualsCaseInsensitive.html</link></decl><decl id="245" type="function"><name>isValidHostmask</name><desc>&lt;div&gt;&lt;p&gt;Makes a cursory verification of a hostmask, ensuring that it doesn't contain
    invalid characters. May very well have false positives.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.isValidHostmask.html</link></decl></decl></decl><decl id="246" type="module"><name>dialect.semver</name><desc>&lt;div&gt;&lt;p&gt;SemVer information about the current release.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.html</link><decl id="247" type="enum"><name>DialectSemVer</name><desc>&lt;div&gt;&lt;p&gt;SemVer versioning of this build.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.DialectSemVer.html</link></decl><decl id="248" type="manifest constant"><name>DialectSemVerPrerelease</name><desc>&lt;div&gt;&lt;p&gt;Pre-release SemVer subversion of this build.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.semver.DialectSemVerPrerelease.html</link></decl></decl><decl id="249" type="module"><name>dialect.defs</name><desc>&lt;div&gt;&lt;p&gt;Definitions of struct aggregates used throughout the library, representing
    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s and thereto related objects like &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCServer.html&quot;&gt;IRCServer&lt;/a&gt; and &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCUser.html&quot;&gt;IRCUser&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.html</link><decl id="250" type="struct"><name>IRCEvent</name><desc>&lt;div&gt;&lt;p&gt;A single IRC event, parsed from server input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.html</link><decl id="251" type="manifest constant"><name>numAuxStrings</name><desc>&lt;div&gt;&lt;p&gt;How many elements should be allocated for auxiliary strings.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.numAuxStrings.html</link></decl><decl id="252" type="manifest constant"><name>numCounts</name><desc>&lt;div&gt;&lt;p&gt;How many elements should be allocated for counts.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.numCounts.html</link></decl><decl id="253" type="enum"><name>Type</name><desc>&lt;div&gt;&lt;p&gt;&lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.Type.html&quot;&gt;Type&lt;/a&gt;s of &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;s.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.Type.html</link></decl><decl id="254" type="variable"><name>type</name><desc>&lt;div&gt;&lt;p&gt;The event type, signifying what *kind* of event this is.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.type.html</link></decl><decl id="255" type="variable"><name>num</name><desc>&lt;div&gt;&lt;p&gt;With a numeric event, the number of the event type.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.num.html</link></decl><decl id="256" type="variable"><name>raw</name><desc>&lt;div&gt;&lt;p&gt;The raw IRC string, untouched.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.raw.html</link></decl><decl id="257" type="variable"><name>sender</name><desc>&lt;div&gt;&lt;p&gt;The name of whoever (or whatever) sent this event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.sender.html</link></decl><decl id="258" type="variable"><name>channel</name><desc>&lt;div&gt;&lt;p&gt;The channel the event transpired in, or is otherwise related to.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.channel.html</link></decl><decl id="259" type="variable"><name>target</name><desc>&lt;div&gt;&lt;p&gt;The target user of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.target.html</link></decl><decl id="260" type="variable"><name>content</name><desc>&lt;div&gt;&lt;p&gt;The main body of text of the event.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.content.html</link></decl><decl id="261" type="variable"><name>aux</name><desc>&lt;div&gt;&lt;p&gt;Auxiliary string array.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.aux.html</link></decl><decl id="262" type="variable"><name>tags</name><desc>&lt;div&gt;&lt;p&gt;IRCv3 message tags attached to this event&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.tags.html</link></decl><decl id="263" type="variable"><name>count</name><desc>&lt;div&gt;&lt;p&gt;Count array.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.count.html</link></decl><decl id="264" type="variable"><name>time</name><desc>&lt;div&gt;&lt;p&gt;A timestamp of when the event transpired.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.time.html</link></decl><decl id="265" type="variable"><name>errors</name><desc>&lt;div&gt;&lt;p&gt;What errors occurred during parsing, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.errors.html</link></decl><decl id="266" type="variable"><name>emotes</name><desc>&lt;div&gt;&lt;p&gt;The Twitch emotes in the message, if any.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.emotes.html</link></decl><decl id="267" type="variable"><name>id</name><desc>&lt;div&gt;&lt;p&gt;The Twitch ID of this message.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCEvent.id.html</link></decl></decl><decl id="268" type="struct"><name>IRCServer</name><desc>&lt;div&gt;&lt;p&gt;Aggregate of all information and state pertaining to the connected IRC
    server. Some fields are transient on a per-connection basis and should not

        (SorceryNet).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.Typenums.sorircd.html</link></decl></decl><decl id="336" type="struct"><name>IRCChannel</name><desc>&lt;div&gt;&lt;p&gt;Aggregate personifying an IRC channel and its state.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.html</link><decl id="337" type="struct"><name>Mode</name><desc>&lt;div&gt;&lt;p&gt;A channel mode.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.html</link><decl id="338" type="variable"><name>modechar</name><desc>&lt;div&gt;&lt;p&gt;The character that implies this &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt; (&lt;tt class=&quot;inline-code&quot;&gt;i&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;z&lt;/tt&gt;, &lt;tt class=&quot;inline-code&quot;&gt;l&lt;/tt&gt; ...).&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.defs.IRCChannel.Mode.modechar.html</link></decl><decl id="339" type="variable"><name>data</name><desc>&lt;div&gt;&lt;p&gt;The data associated with the &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCChannel.Mode.html&quot;&gt;Mode&lt;/a&gt;, if applicable. This is often a

alect.defs.IRCChannel.users.html</link></decl><decl id="351" type="variable"><name>mods</name><desc>&lt;div&gt;&lt;p&gt;Associative array of nicknames with a prefixing channel mode (operator,

    source code &lt;tt class=&quot;inline-code&quot;&gt;unittest&lt;/tt&gt; blocks.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.html</link><decl id="366" type="function"><name>formatClientAssignment</name><desc>&lt;div&gt;&lt;p&gt;Constructs statement lines for each changed field of an

    &lt;a class=&quot;xref&quot; href=&quot;dialect.defs.IRCEvent.html&quot;&gt;IRCEvent&lt;/a&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.formatEventAssertBlock.html</link></decl><decl id="368" type="function"><name>inputServerInformation</name><desc>&lt;div&gt;&lt;p&gt;Asks the user to input server information via standard input.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.assertgen.inputServerInformation.html</link></decl></decl><decl id="369" type="module"><name>dialect.common</name><desc>&lt;div&gt;&lt;p&gt;Helper functions needed to parse raw IRC event strings into

    &lt;tt class=&quot;inline-code&quot;&gt;@nickname&lt;/tt&gt;. Saves the stripped signs in the ref string &lt;tt class=&quot;inline-code&quot;&gt;modesigns&lt;/tt&gt;.&lt;/p&gt;&lt;/div&gt;</desc><link>dialect.common.stripModesign.1.html</link></decl><decl id="377" type="function"><name>stripModesign</name><desc>&lt;div&gt;&lt;p&gt;Convenience function to &lt;a class=&quot;xref&quot; href=&quot;dialect.common.stripModesign.2.html&quot;&gt;stripModesign&lt;/a&gt; that doesn't take an out string
